<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${activity.title} + ' - PeaceHaven · 长安'">活动详情</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;600;700&family=Noto+Sans+SC:wght@300;400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <style>
        /* === Detail Page Styles === */
        .detail-hero {
            position: relative;
            padding: 140px 0 80px;
            background: var(--gradient-hero);
            text-align: center;
            overflow: hidden;
        }

        .detail-hero::before {
            content: '';
            position: absolute;
            inset: 0;
            background: rgba(0,0,0,0.2);
        }

        .detail-hero-content {
            position: relative;
            z-index: 1;
        }

        .detail-back {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            color: rgba(255,255,255,0.85);
            text-decoration: none;
            font-size: 0.9rem;
            margin-bottom: 24px;
            padding: 8px 16px;
            border-radius: 20px;
            background: rgba(255,255,255,0.15);
            backdrop-filter: blur(6px);
            transition: all 0.2s;
        }

        .detail-back:hover {
            background: rgba(255,255,255,0.25);
            color: #fff;
        }

        .detail-status-badge {
            display: inline-block;
            padding: 6px 18px;
            border-radius: 20px;
            font-size: 0.85rem;
            font-weight: 600;
            margin-bottom: 16px;
        }

        .detail-status-ongoing { background: rgba(76,175,80,0.9); color: #fff; }
        .detail-status-upcoming { background: rgba(33,150,243,0.9); color: #fff; }
        .detail-status-ended { background: rgba(158,158,158,0.9); color: #fff; }

        .detail-title {
            font-family: 'Noto Serif SC', serif;
            font-size: 2.8rem;
            color: #fff;
            margin-bottom: 16px;
            text-shadow: 0 2px 30px rgba(0,0,0,0.4);
        }

        .detail-period {
            color: rgba(255,255,255,0.9);
            font-size: 1.05rem;
        }

        .detail-type-badge {
            display: inline-block;
            padding: 5px 14px;
            border-radius: 8px;
            font-size: 0.85rem;
            font-weight: 600;
            margin-top: 16px;
            background: rgba(255,255,255,0.2);
            color: #fff;
            backdrop-filter: blur(6px);
        }

        /* Main content area */
        .detail-body {
            max-width: 900px;
            margin: -40px auto 80px;
            padding: 0 20px;
            position: relative;
            z-index: 2;
        }

        .detail-card {
            background: var(--bg-card);
            border-radius: 20px;
            border: var(--border-card);
            box-shadow: var(--shadow-lg);
            overflow: hidden;
        }

        .detail-thumbnail {
            width: 100%;
            height: 380px;
            object-fit: cover;
        }

        .detail-content-area {
            padding: 36px;
        }

        .detail-summary {
            font-size: 1.1rem;
            color: var(--text-secondary);
            line-height: 1.8;
            padding-bottom: 24px;
            margin-bottom: 28px;
            border-bottom: 1px dashed var(--border-color);
        }

        .detail-full-content {
            color: var(--text-primary);
            line-height: 1.9;
            font-size: 1rem;
        }

        .detail-full-content p { margin-bottom: 16px; }
        .detail-full-content h3 {
            font-family: 'Noto Serif SC', serif;
            margin: 28px 0 16px;
            color: var(--accent-primary);
        }

        /* === Vote Section === */
        .vote-section {
            padding: 36px;
        }

        .vote-section-title {
            font-family: 'Noto Serif SC', serif;
            font-size: 1.4rem;
            color: var(--text-primary);
            margin-bottom: 8px;
        }

        .vote-total {
            font-size: 0.9rem;
            color: var(--text-muted);
            margin-bottom: 28px;
        }

        .vote-message {
            padding: 14px 20px;
            border-radius: 12px;
            margin-bottom: 24px;
            font-size: 0.95rem;
            font-weight: 500;
        }

        .vote-message.success { background: #e8f5e9; color: #2e7d32; }
        .vote-message.error { background: #ffebee; color: #c62828; }

        .vote-options-list {
            display: flex;
            flex-direction: column;
            gap: 14px;
            margin-bottom: 32px;
        }

        .vote-option-row {
            background: var(--bg-secondary);
            border-radius: 12px;
            padding: 16px 20px;
            border: 1px solid var(--border-color);
            transition: all 0.2s;
        }

        .vote-option-row:hover {
            border-color: var(--accent-primary);
            box-shadow: 0 0 0 2px rgba(232,131,58,0.1);
        }

        .vote-option-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
        }

        .vote-option-name {
            font-weight: 600;
            color: var(--text-primary);
            font-size: 1rem;
        }

        .vote-option-count {
            font-size: 0.88rem;
            color: var(--text-muted);
            font-weight: 500;
        }

        .vote-progress-bar {
            height: 10px;
            background: var(--bg-primary);
            border-radius: 10px;
            overflow: hidden;
        }

        .vote-progress-fill {
            height: 100%;
            background: var(--gradient-accent);
            border-radius: 10px;
            transition: width 0.6s ease;
        }

        .vote-option-img {
            width: 80px;
            height: 60px;
            object-fit: cover;
            border-radius: 8px;
            margin-top: 10px;
        }

        /* Vote form */
        .vote-form-section {
            background: var(--bg-secondary);
            border-radius: 14px;
            padding: 24px;
            border: 1px dashed var(--accent-primary);
            margin-top: 8px;
        }

        .vote-form-title {
            font-weight: 600;
            color: var(--accent-primary);
            margin-bottom: 16px;
            font-size: 1.05rem;
        }

        .vote-form-group {
            margin-bottom: 14px;
        }

        .vote-form-group label {
            display: block;
            font-size: 0.88rem;
            color: var(--text-secondary);
            margin-bottom: 6px;
            font-weight: 500;
        }

        .vote-form-group input,
        .vote-form-group select {
            width: 100%;
            padding: 10px 14px;
            border: 1px solid var(--border-color);
            border-radius: 10px;
            font-size: 0.92rem;
            background: var(--bg-card);
            color: var(--text-primary);
            transition: border-color 0.2s;
        }

        .vote-form-group input:focus,
        .vote-form-group select:focus {
            outline: none;
            border-color: var(--accent-primary);
        }

        .btn-vote {
            width: 100%;
            padding: 12px;
            background: var(--gradient-accent);
            color: #fff;
            border: none;
            border-radius: 10px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }

        .btn-vote:hover {
            transform: translateY(-2px);
            box-shadow: var(--shadow-glow);
        }

        .vote-ended-note {
            text-align: center;
            padding: 16px;
            color: var(--text-muted);
            font-style: italic;
            background: var(--bg-secondary);
            border-radius: 12px;
            margin-top: 16px;
        }

        /* === Leaderboard Section === */
        .leaderboard-section {
            padding: 36px;
        }

        .leaderboard-title {
            font-family: 'Noto Serif SC', serif;
            font-size: 1.4rem;
            color: var(--text-primary);
            margin-bottom: 24px;
        }

        .leaderboard-table {
            width: 100%;
            border-collapse: collapse;
        }

        .leaderboard-table thead {
            background: var(--bg-secondary);
        }

        .leaderboard-table th {
            padding: 14px 18px;
            text-align: left;
            font-size: 0.85rem;
            font-weight: 600;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            border-bottom: 2px solid var(--border-color);
        }

        .leaderboard-table td {
            padding: 14px 18px;
            border-bottom: 1px solid var(--border-color);
            font-size: 0.95rem;
            color: var(--text-primary);
            vertical-align: middle;
        }

        .leaderboard-table tr:hover {
            background: var(--bg-secondary);
        }

        .rank-medal {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 32px;
            height: 32px;
            border-radius: 50%;
            font-weight: 700;
            font-size: 0.9rem;
        }

        .rank-1 { background: #FFD700; color: #7B4A00; }
        .rank-2 { background: #C0C0C0; color: #3D3D3D; }
        .rank-3 { background: #CD7F32; color: #fff; }
        .rank-other { background: var(--bg-secondary); color: var(--text-muted); }

        .leaderboard-empty {
            text-align: center;
            padding: 40px;
            color: var(--text-muted);
            font-style: italic;
        }

        @media (max-width: 768px) {
            .detail-hero { padding: 110px 0 60px; }
            .detail-title { font-size: 1.8rem; }
            .detail-thumbnail { height: 220px; }
            .detail-content-area, .vote-section, .leaderboard-section { padding: 24px; }
            .leaderboard-table th, .leaderboard-table td { padding: 10px 12px; font-size: 0.85rem; }
        }
    </style>
</head>
<body data-theme="day">

<!-- 导航栏 -->
<nav class="navbar" id="navbar">
    <div class="nav-container">
        <a href="/" class="nav-logo">
            <img th:src="@{/images/peacehaven_logo_1.png}" alt="PeaceHaven Logo" class="logo-icon">
            <span class="logo-text">PeaceHaven · 长安</span>
        </a>
        <ul class="nav-links" id="navLinks">
            <li><a href="/#hero" class="nav-link">首页</a></li>
            <li><a href="/#about" class="nav-link">营地简介</a></li>
            <li><a href="/#team" class="nav-link">管理组</a></li>
            <li><a href="/activities" class="nav-link active">活动</a></li>
            <li><a href="/#benefits" class="nav-link">福利</a></li>
        </ul>
        <div class="nav-actions">
            <button class="theme-toggle" id="themeToggle" aria-label="切换主题">
                <span class="theme-icon-day">☀️</span>
                <span class="theme-icon-night">🌙</span>
            </button>
            <button class="nav-hamburger" id="hamburger" aria-label="菜单">
                <span></span><span></span><span></span>
            </button>
        </div>
    </div>
</nav>

<!-- 页面头部 -->
<section class="detail-hero">
    <div class="detail-hero-content">
        <a href="/activities" class="detail-back">← 返回活动列表</a>
        <div>
            <span class="detail-status-badge"
                  th:classappend="'detail-status-' + ${activity.status.name().toLowerCase()}"
                  th:text="${activity.status.name() == 'ONGOING' ? '🔥 进行中' : (activity.status.name() == 'UPCOMING' ? '📅 即将开始' : '✅ 已结束')}"></span>
        </div>
        <h1 class="detail-title" th:text="${activity.title}"></h1>
        <p class="detail-period"
           th:text="${(activity.startDate != null ? #temporals.format(activity.startDate, 'yyyy年MM月dd日 HH:mm') : '待定') + (activity.endDate != null ? ' 至 ' + #temporals.format(activity.endDate, 'yyyy年MM月dd日 HH:mm') : '')}"></p>
        <span class="detail-type-badge"
              th:text="${activity.templateType.name() == 'VOTE' ? '🗳 投票活动' : (activity.templateType.name() == 'LEADERBOARD' ? '🏆 排行活动' : '📋 基础活动')}"></span>
    </div>
</section>

<!-- 详情主体 -->
<div class="detail-body">
    <div class="detail-card">

        <!-- 缩略图 -->
        <img th:if="${activity.thumbnail != null and !activity.thumbnail.isEmpty()}"
             th:src="${activity.thumbnail}" th:alt="${activity.title}" class="detail-thumbnail">

        <!-- 基础内容区（所有类型都显示摘要+正文） -->
        <div class="detail-content-area" th:if="${activity.summary != null or activity.content != null}">
            <p th:if="${activity.summary != null}" class="detail-summary" th:text="${activity.summary}"></p>
            <div th:if="${activity.content != null}" class="detail-full-content" th:utext="${activity.content}"></div>
        </div>

        <!-- === VOTE 投票模块 === -->
        <div class="vote-section" th:if="${activity.templateType.name() == 'VOTE'}">
            <h2 class="vote-section-title">🗳 投票区</h2>
            <p class="vote-total" th:text="'当前共有 ' + ${totalVotes} + ' 票'"></p>

            <!-- 投票提示消息 -->
            <div th:if="${voteMessage}" class="vote-message"
                 th:classappend="${voteMessage == '投票成功！' ? 'success' : 'error'}"
                 th:text="${voteMessage}"></div>

            <!-- 投票选项列表 + 进度条 -->
            <div class="vote-options-list">
                <div th:each="opt : ${voteOptions}" class="vote-option-row">
                    <div class="vote-option-header">
                        <span class="vote-option-name" th:text="${opt.optionName}"></span>
                        <span class="vote-option-count"
                              th:text="${opt.voteCount} + ' 票 (' + (${totalVotes > 0 ? (opt.voteCount * 100 / totalVotes) : 0}) + '%)'"></span>
                    </div>
                    <div class="vote-progress-bar">
                        <div class="vote-progress-fill"
                             th:style="'width:' + ${totalVotes > 0 ? (opt.voteCount * 100 / totalVotes) : 0} + '%'"></div>
                    </div>
                    <img th:if="${opt.optionImage != null and !opt.optionImage.isEmpty()}"
                         th:src="${opt.optionImage}" class="vote-option-img" alt="">
                </div>
            </div>

            <!-- 投票表单（活动进行中时显示） -->
            <div th:if="${activity.status.name() == 'ONGOING'}" class="vote-form-section">
                <div class="vote-form-title">✍️ 投出你的一票</div>
                <form th:action="@{/activities/{id}/vote(id=${activity.id})}" method="post">
                    <div class="vote-form-group">
                        <label for="voterName">你的游戏名称</label>
                        <input type="text" id="voterName" name="voterName" required maxlength="50"
                               placeholder="输入你的游戏名（每人限投一票）">
                    </div>
                    <div class="vote-form-group">
                        <label for="optionId">选择选项</label>
                        <select id="optionId" name="optionId" required>
                            <option value="">-- 请选择 --</option>
                            <option th:each="opt : ${voteOptions}" th:value="${opt.id}" th:text="${opt.optionName}"></option>
                        </select>
                    </div>
                    <button type="submit" class="btn-vote">提交投票</button>
                </form>
            </div>

            <!-- 活动未开始或已结束 -->
            <div th:if="${activity.status.name() != 'ONGOING'}" class="vote-ended-note">
                <span th:if="${activity.status.name() == 'ENDED'}">🔒 投票已结束，感谢每一位参与者！</span>
                <span th:if="${activity.status.name() == 'UPCOMING'}">⏳ 活动尚未开始，开始后即可投票</span>
            </div>
        </div>

        <!-- === LEADERBOARD 排行榜模块 === -->
        <div class="leaderboard-section" th:if="${activity.templateType.name() == 'LEADERBOARD'}">
            <h2 class="leaderboard-title">🏆 排行榜</h2>

            <table class="leaderboard-table" th:if="${!#lists.isEmpty(leaderboardEntries)}">
                <thead>
                <tr>
                    <th style="width:80px">排名</th>
                    <th>玩家</th>
                    <th style="text-align:right">成绩</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="entry : ${leaderboardEntries}">
                    <td>
                        <span class="rank-medal"
                              th:classappend="${entry.rankPosition == 1 ? 'rank-1' : (entry.rankPosition == 2 ? 'rank-2' : (entry.rankPosition == 3 ? 'rank-3' : 'rank-other'))}"
                              th:text="${entry.rankPosition == 1 ? '🥇' : (entry.rankPosition == 2 ? '🥈' : (entry.rankPosition == 3 ? '🥉' : entry.rankPosition))}"></span>
                    </td>
                    <td th:text="${entry.playerName}" style="font-weight:500"></td>
                    <td style="text-align:right; font-weight:600; color: var(--accent-primary)" th:text="${entry.score}"></td>
                </tr>
                </tbody>
            </table>

            <div class="leaderboard-empty" th:if="${#lists.isEmpty(leaderboardEntries)}">
                📋 暂无排行数据，快来参与活动吧！
            </div>
        </div>

    </div>
</div>

<!-- 页尾 -->
<footer class="footer" id="footer">
    <div class="footer-wave">
        <svg viewBox="0 0 1440 120" preserveAspectRatio="none">
            <path d="M0,60 C360,120 720,0 1080,60 C1260,90 1380,80 1440,60 L1440,120 L0,120 Z" fill="currentColor"/>
        </svg>
    </div>
    <div class="container">
        <div class="footer-bottom">
            <p class="footer-slogan">「 长安不在远方，在此一隅灯火未熄 」</p>
            <p class="footer-copyright">© 2026 PeaceHaven · 长安营地 | 明日之后</p>
            <p class="footer-icp"><a href="https://beian.miit.gov.cn/">浙ICP备2025218889号-3</a></p>
        </div>
    </div>
</footer>

<button class="back-to-top" id="backToTop" aria-label="回到顶部">↑</button>
<script th:src="@{/js/main.js}"></script>
<script th:src="@{/js/auth.js}"></script>
</body>
</html>
