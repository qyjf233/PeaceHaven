<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${isEdit ? '编辑活动' : '创建活动'} + ' - PeaceHaven Admin'">活动表单</title>
    <link rel="stylesheet" th:href="@{/css/admin.css}">
</head>
<body>
<div class="admin-container">
    <header class="admin-header">
        <h1 th:text="${isEdit ? '编辑活动' : '创建活动'}">活动表单</h1>
        <a href="/admin/activities" class="btn-back">← 返回列表</a>
    </header>

    <div th:if="${message}" class="alert alert-success" th:text="${message}"></div>

    <form th:action="${isEdit ? '/admin/activities/' + form.id : '/admin/activities'}" method="post" class="admin-form">
        <div class="form-group">
            <label for="slug">活动标识 (slug) *</label>
            <input type="text" id="slug" name="slug" th:value="${form.slug}" required maxlength="100" placeholder="如：changan-building-contest（用于URL和模板映射）">
        </div>

        <div class="form-group">
            <label for="title">活动标题 *</label>
            <input type="text" id="title" name="title" th:value="${form.title}" required maxlength="100" placeholder="如：长安建筑大赛">
        </div>

        <div class="form-group">
            <label for="summary">活动简介（列表页展示）</label>
            <textarea id="summary" name="summary" rows="2" maxlength="500" th:text="${form.summary}" placeholder="一句话描述活动"></textarea>
        </div>

        <div class="form-group">
            <label for="thumbnail">缩略图URL</label>
            <input type="text" id="thumbnail" name="thumbnail" th:value="${form.thumbnail}" placeholder="https://... 或 /images/...">
        </div>

        <div class="form-row">
            <div class="form-group">
                <label for="startDate">开始时间</label>
                <input type="datetime-local" id="startDate" name="startDate" th:value="${form.startDate}">
            </div>
            <div class="form-group">
                <label for="endDate">结束时间</label>
                <input type="datetime-local" id="endDate" name="endDate" th:value="${form.endDate}">
            </div>
        </div>

        <div class="form-actions">
            <button type="submit" class="btn btn-primary" th:text="${isEdit ? '保存修改' : '创建活动'}">提交</button>
            <a href="/admin/activities" class="btn btn-secondary">取消</a>
        </div>
    </form>
</div>
</body>
</html>
