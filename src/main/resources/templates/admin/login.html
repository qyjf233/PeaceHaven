<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>管理员登录 - PeaceHaven Admin</title>
    <link rel="stylesheet" th:href="@{/css/admin.css}">
    <style>
        body {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #3D2C1E 0%, #1A1420 100%);
        }

        .login-card {
            background: #fff;
            border-radius: 16px;
            padding: 40px;
            width: 400px;
            max-width: 92vw;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }

        .login-card h1 {
            font-size: 1.5rem;
            color: #3D2C1E;
            margin-bottom: 6px;
        }

        .login-card .subtitle {
            color: #777;
            font-size: 0.88rem;
            margin-bottom: 28px;
        }

        .form-group { margin-bottom: 18px; }

        .form-group label {
            display: block;
            font-size: 0.85rem;
            font-weight: 600;
            color: #333;
            margin-bottom: 6px;
        }

        .form-group input {
            width: 100%;
            padding: 12px 14px;
            border: 1px solid #e0e0e0;
            border-radius: 8px;
            font-size: 0.95rem;
            transition: border-color 0.2s;
        }

        .form-group input:focus {
            outline: none;
            border-color: #E8833A;
            box-shadow: 0 0 0 3px rgba(232,131,58,0.1);
        }

        .code-row {
            display: flex;
            gap: 10px;
        }

        .code-row input { flex: 1; }

        .btn-send {
            padding: 12px 14px;
            border: 1px solid #E8833A;
            border-radius: 8px;
            background: transparent;
            color: #E8833A;
            font-size: 0.85rem;
            cursor: pointer;
            white-space: nowrap;
            transition: all 0.2s;
        }

        .btn-send:hover:not(:disabled) {
            background: #E8833A;
            color: #fff;
        }

        .btn-send:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            border-color: #999;
            color: #999;
        }

        .agreement-row {
            display: flex;
            align-items: center;
            gap: 4px;
            font-size: 0.82rem;
            margin-bottom: 20px;
        }

        .agreement-row label {
            display: flex;
            align-items: center;
            gap: 5px;
            cursor: pointer;
            color: #555;
        }

        .agreement-row input[type="checkbox"] {
            accent-color: #E8833A;
            width: 15px;
            height: 15px;
        }

        .agreement-row a { color: #E8833A; text-decoration: none; }
        .agreement-row a:hover { text-decoration: underline; }

        .btn-submit {
            width: 100%;
            padding: 13px;
            border: none;
            border-radius: 10px;
            background: linear-gradient(135deg, #E8833A, #E8654A);
            color: #fff;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.25s;
        }

        .btn-submit:hover:not(:disabled) {
            transform: translateY(-1px);
            box-shadow: 0 4px 20px rgba(232,131,58,0.4);
        }

        .btn-submit:disabled { opacity: 0.6; cursor: not-allowed; }

        .message {
            text-align: center;
            font-size: 0.88rem;
            margin-top: 14px;
            min-height: 20px;
        }

        .message.success { color: #4CAF50; }
        .message.error { color: #F44336; }
    </style>
</head>
<body>
<div class="login-card">
    <h1>PeaceHaven 管理后台</h1>
    <p class="subtitle">仅限管理员登录</p>

    <div class="form-group">
        <label for="phone">手机号</label>
        <input type="tel" id="phone" maxlength="11" placeholder="请输入管理员手机号">
    </div>

    <div class="form-group">
        <label for="code">验证码</label>
        <div class="code-row">
            <input type="text" id="code" maxlength="4" placeholder="4位验证码" inputmode="numeric">
            <button class="btn-send" id="sendBtn">获取验证码</button>
        </div>
    </div>

    <div class="agreement-row">
        <label><input type="checkbox" id="agreed"><span>我已阅读并同意</span></label>
        <a href="/agreement" target="_blank">《用户服务协议》</a>
    </div>

    <button class="btn-submit" id="submitBtn">登录</button>
    <div class="message" id="msg"></div>
</div>

<script>
(function() {
    var phoneInput = document.getElementById('phone');
    var codeInput = document.getElementById('code');
    var sendBtn = document.getElementById('sendBtn');
    var submitBtn = document.getElementById('submitBtn');
    var agreedBox = document.getElementById('agreed');
    var msg = document.getElementById('msg');

    phoneInput.addEventListener('input', function() { this.value = this.value.replace(/\D/g, ''); });
    codeInput.addEventListener('input', function() { this.value = this.value.replace(/\D/g, ''); });

    function showMsg(text, ok) {
        msg.textContent = text;
        msg.className = 'message ' + (ok ? 'success' : 'error');
    }

    sendBtn.addEventListener('click', function() {
        var phone = phoneInput.value.trim();
        if (!/^1[3-9]\d{9}$/.test(phone)) { showMsg('请输入正确的手机号', false); return; }
        if (sendBtn.disabled) return;

        sendBtn.disabled = true;
        sendBtn.textContent = '发送中...';

        fetch('/api/auth/send-code', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ phone: phone })
        }).then(r => r.json()).then(data => {
            if (data.success) {
                showMsg('验证码已发送', true);
                var sec = 60;
                sendBtn.textContent = sec + 's';
                var timer = setInterval(function() {
                    sec--;
                    if (sec <= 0) {
                        clearInterval(timer);
                        sendBtn.disabled = false;
                        sendBtn.textContent = '重新获取';
                    } else {
                        sendBtn.textContent = sec + 's';
                    }
                }, 1000);
            } else {
                showMsg(data.message, false);
                sendBtn.disabled = false;
                sendBtn.textContent = '获取验证码';
            }
        }).catch(function() {
            showMsg('网络错误', false);
            sendBtn.disabled = false;
            sendBtn.textContent = '获取验证码';
        });
    });

    submitBtn.addEventListener('click', function() {
        var phone = phoneInput.value.trim();
        var code = codeInput.value.trim();

        if (!/^1[3-9]\d{9}$/.test(phone)) { showMsg('请输入正确的手机号', false); return; }
        if (code.length !== 4) { showMsg('请输入4位验证码', false); return; }
        if (!agreedBox.checked) { showMsg('请先同意用户协议', false); return; }

        submitBtn.disabled = true;
        submitBtn.textContent = '登录中...';

        fetch('/api/auth/login', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ phone: phone, code: code, agreed: 'true' })
        }).then(r => r.json()).then(data => {
            if (data.success) {
                if (data.role === 'ADMIN') {
                    showMsg('登录成功，正在跳转...', true);
                    setTimeout(function() { window.location.href = '/admin/activities'; }, 600);
                } else {
                    showMsg('你不是管理员，无法访问后台', false);
                    submitBtn.disabled = false;
                    submitBtn.textContent = '登录';
                }
            } else {
                showMsg(data.message, false);
                submitBtn.disabled = false;
                submitBtn.textContent = '登录';
            }
        }).catch(function() {
            showMsg('网络错误', false);
            submitBtn.disabled = false;
            submitBtn.textContent = '登录';
        });
    });
})();
</script>
</body>
</html>
