<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>活动列表 - PeaceHaven · 长安</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;600;700&family=Noto+Sans+SC:wght@300;400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <style>
        /* === Activity List Page Styles === */
        .page-main {
            min-height: calc(100vh - 80px);
            display: flex;
            flex-direction: column;
        }

        .page-header {
            padding: 100px 0 40px;
            text-align: center;
            background: var(--gradient-hero);
            position: relative;
        }

        .page-header::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            height: 60px;
            background: linear-gradient(to top, var(--bg-primary), transparent);
        }

        .page-header h1 {
            font-family: 'Noto Serif SC', serif;
            font-size: 2.2rem;
            color: #fff;
            margin-bottom: 10px;
            text-shadow: 0 2px 20px rgba(0,0,0,0.3);
        }

        .page-header p {
            color: rgba(255,255,255,0.85);
            font-size: 1rem;
        }

        .list-content {
            flex: 1;
        }

        .filter-bar {
            display: flex;
            justify-content: center;
            gap: 16px;
            margin: -10px 0 36px;
            position: relative;
            z-index: 2;
            flex-wrap: wrap;
        }

        .filter-btn {
            padding: 10px 28px;
            border-radius: 50px;
            border: 1px solid var(--border-color);
            background: var(--bg-card);
            color: var(--text-secondary);
            font-size: 0.95rem;
            font-weight: 500;
            transition: all 0.3s;
            box-shadow: var(--shadow-sm);
            cursor: pointer;
        }

        .filter-btn:hover,
        .filter-btn.active {
            background: var(--accent-primary);
            color: #fff;
            border-color: var(--accent-primary);
            box-shadow: var(--shadow-glow);
        }

        .activities-page-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 32px;
            margin-bottom: 40px;
            min-height: 200px;
        }

        .activity-list-card {
            background: var(--bg-card);
            border-radius: 16px;
            overflow: hidden;
            border: var(--border-card);
            box-shadow: var(--shadow-sm);
            transition: all 0.3s ease;
            text-decoration: none;
            color: inherit;
            display: flex;
            flex-direction: column;
            opacity: 0;
            transform: translateY(20px);
            animation: cardFadeIn 0.4s ease forwards;
        }

        @keyframes cardFadeIn {
            to { opacity: 1; transform: translateY(0); }
        }

        .activity-list-card:nth-child(1) { animation-delay: 0s; }
        .activity-list-card:nth-child(2) { animation-delay: 0.06s; }
        .activity-list-card:nth-child(3) { animation-delay: 0.12s; }
        .activity-list-card:nth-child(4) { animation-delay: 0.18s; }
        .activity-list-card:nth-child(5) { animation-delay: 0.24s; }
        .activity-list-card:nth-child(6) { animation-delay: 0.30s; }
        .activity-list-card:nth-child(7) { animation-delay: 0.36s; }
        .activity-list-card:nth-child(8) { animation-delay: 0.42s; }
        .activity-list-card:nth-child(9) { animation-delay: 0.48s; }

        .activity-list-card:hover {
            transform: translateY(-6px);
            box-shadow: var(--shadow-lg);
        }

        .activity-list-img {
            position: relative;
            height: 200px;
            overflow: hidden;
        }

        .activity-list-img img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.4s;
        }

        .activity-list-card:hover .activity-list-img img {
            transform: scale(1.05);
        }

        .activity-status-badge {
            position: absolute;
            top: 12px;
            right: 12px;
            padding: 5px 14px;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: 600;
            backdrop-filter: blur(8px);
        }

        .badge-ongoing { background: rgba(76, 175, 80, 0.85); color: #fff; }
        .badge-upcoming { background: rgba(33, 150, 243, 0.85); color: #fff; }
        .badge-ended { background: rgba(158, 158, 158, 0.85); color: #fff; }

        .activity-type-tag {
            position: absolute;
            top: 12px;
            left: 12px;
            padding: 4px 10px;
            border-radius: 6px;
            font-size: 0.75rem;
            font-weight: 600;
            background: rgba(0,0,0,0.55);
            color: #fff;
            backdrop-filter: blur(4px);
        }

        .activity-list-info {
            padding: 24px;
            flex: 1;
            display: flex;
            flex-direction: column;
        }

        .activity-list-period {
            font-size: 0.85rem;
            color: var(--accent-primary);
            font-weight: 500;
            margin-bottom: 10px;
        }

        .activity-list-title {
            font-family: 'Noto Serif SC', serif;
            font-size: 1.25rem;
            color: var(--text-primary);
            margin-bottom: 12px;
            line-height: 1.4;
        }

        .activity-list-desc {
            font-size: 0.92rem;
            color: var(--text-muted);
            line-height: 1.7;
            flex: 1;
            display: -webkit-box;
            -webkit-line-clamp: 3;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        /* Pagination */
        .pagination {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-bottom: 60px;
        }

        .pagination button {
            padding: 10px 18px;
            border-radius: 8px;
            font-size: 0.92rem;
            border: 1px solid var(--border-color);
            background: var(--bg-card);
            color: var(--text-secondary);
            cursor: pointer;
            transition: all 0.2s;
        }

        .pagination button:hover,
        .pagination button.current {
            background: var(--accent-primary);
            color: #fff;
            border-color: var(--accent-primary);
        }

        .pagination button.current { cursor: default; }
        .pagination button:disabled {
            opacity: 0.4;
            cursor: not-allowed;
        }

        /* Empty state */
        .empty-state-list {
            text-align: center;
            padding: 100px 20px;
            color: var(--text-muted);
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .empty-state-list .empty-icon {
            font-size: 4rem;
            margin-bottom: 16px;
            opacity: 0.5;
        }

        /* Loading */
        .loading-spinner {
            text-align: center;
            padding: 60px 20px;
            color: var(--text-muted);
            grid-column: 1 / -1;
        }

        .loading-spinner::after {
            content: '';
            display: inline-block;
            width: 28px;
            height: 28px;
            border: 3px solid var(--border-color);
            border-top-color: var(--accent-primary);
            border-radius: 50%;
            animation: spin 0.7s linear infinite;
            margin-left: 10px;
            vertical-align: middle;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* Result count */
        .result-count {
            text-align: center;
            font-size: 0.9rem;
            color: var(--text-muted);
            margin-bottom: 24px;
        }

        /* Tablet */
        @media (max-width: 1024px) {
            .activities-page-grid {
                grid-template-columns: repeat(2, 1fr);
                gap: 24px;
            }
        }

        /* Mobile */
        @media (max-width: 768px) {
            .page-header { padding: 110px 0 40px; }
            .page-header h1 { font-size: 1.8rem; }
            .activities-page-grid { grid-template-columns: 1fr; gap: 20px; }
        }
    </style>
</head>
<body data-theme="day">

<!-- 导航栏 -->
<nav class="navbar" id="navbar">
    <div class="nav-container">
        <a href="/" class="nav-logo">
            <img th:src="@{/images/peacehaven_logo_1.png}" alt="PeaceHaven Logo" class="logo-icon">
            <span class="logo-text">PeaceHaven · 长安</span>
        </a>
        <ul class="nav-links" id="navLinks">
            <li><a href="/#hero" class="nav-link">首页</a></li>
            <li><a href="/#about" class="nav-link">营地简介</a></li>
            <li><a href="/#team" class="nav-link">管理组</a></li>
            <li><a href="/#activities" class="nav-link active">活动</a></li>
            <li><a href="/#benefits" class="nav-link">福利</a></li>
        </ul>
        <div class="nav-actions">
            <button class="theme-toggle" id="themeToggle" aria-label="切换主题">
                <span class="theme-icon-day">☀️</span>
                <span class="theme-icon-night">🌙</span>
            </button>
            <button class="nav-hamburger" id="hamburger" aria-label="菜单">
                <span></span><span></span><span></span>
            </button>
        </div>
    </div>
</nav>

<div class="page-main">
    <!-- 页面头部 -->
    <section class="page-header">
        <h1>活动档案</h1>
        <p>记录每一次相聚，珍藏每一份回忆</p>
    </section>

    <div class="container list-content">
        <!-- 状态筛选 -->
        <div class="filter-bar" id="filterBar">
            <button class="filter-btn active" data-status="">全部</button>
            <button class="filter-btn" data-status="ONGOING">进行中</button>
            <button class="filter-btn" data-status="UPCOMING">即将开始</button>
            <button class="filter-btn" data-status="ENDED">已结束</button>
        </div>

        <!-- 结果计数 -->
        <div class="result-count" id="resultCount"></div>

        <!-- 活动卡片网格 -->
        <div class="activities-page-grid" id="activityGrid">
            <div class="loading-spinner">加载中</div>
        </div>

        <!-- 分页 -->
        <div class="pagination" id="pagination"></div>
    </div>
</div>

<!-- 页尾 -->
<footer class="footer" id="footer">
    <div class="footer-wave">
        <svg viewBox="0 0 1440 120" preserveAspectRatio="none">
            <path d="M0,60 C360,120 720,0 1080,60 C1260,90 1380,80 1440,60 L1440,120 L0,120 Z" fill="currentColor"/>
        </svg>
    </div>
    <div class="container">
        <div class="footer-bottom">
            <p class="footer-slogan">「 长安不在远方，在此一隅灯火未熄 」</p>
            <p class="footer-copyright">© 2026 PeaceHaven · 长安营地 | 明日之后</p>
            <p class="footer-icp"><a href="https://beian.miit.gov.cn/">浙ICP备2025218889号-3</a></p>
        </div>
    </div>
</footer>

<button class="back-to-top" id="backToTop" aria-label="回到顶部">↑</button>
<script th:src="@{/js/main.js}"></script>
<script th:src="@{/js/auth.js}"></script>
<script>
(function() {
    const grid = document.getElementById('activityGrid');
    const pagination = document.getElementById('pagination');
    const filterBar = document.getElementById('filterBar');
    const resultCount = document.getElementById('resultCount');

    let currentStatus = '';
    let currentPage = 0;
    const pageSize = 9;

    // === 日期格式化 ===
    function formatDate(dateStr) {
        if (!dateStr) return '';
        const d = new Date(dateStr);
        const y = d.getFullYear();
        const m = String(d.getMonth() + 1).padStart(2, '0');
        const day = String(d.getDate()).padStart(2, '0');
        return y + '.' + m + '.' + day;
    }

    // === 状态文本映射 ===
    const statusMap = { ONGOING: '进行中', UPCOMING: '即将开始', ENDED: '已结束' };
    

    // === 渲染卡片 ===
    function renderCards(activities) {
        if (!activities || activities.length === 0) {
            grid.innerHTML = '<div class="empty-state-list"><div class="empty-icon">📭</div><p>暂无活动记录</p></div>';
            return;
        }
        grid.innerHTML = activities.map(function(a, i) {
            var imgSrc = a.thumbnail || '/images/banner_1.png';
            var period = formatDate(a.startDate) + (a.endDate ? ' - ' + formatDate(a.endDate) : '');
            var statusLabel = statusMap[a.status] || a.status;
            
            return '<a href="/activities/' + a.slug + '" class="activity-list-card" style="animation-delay:' + (i * 0.06) + 's">' +
                '<div class="activity-list-img">' +
                    '<img src="' + imgSrc + '" alt="' + a.title + '">' +
                    '<span class="activity-status-badge badge-' + a.status.toLowerCase() + '">' + statusLabel + '</span>' +
                    
                '</div>' +
                '<div class="activity-list-info">' +
                    '<div class="activity-list-period">' + period + '</div>' +
                    '<h3 class="activity-list-title">' + a.title + '</h3>' +
                    '<p class="activity-list-desc">' + (a.summary || '') + '</p>' +
                '</div>' +
            '</a>';
        }).join('');
    }

    // === 渲染分页 ===
    function renderPagination(current, total) {
        if (total <= 1) {
            pagination.innerHTML = '';
            return;
        }
        var html = '';
        // 上一页
        html += '<button data-page="' + (current - 1) + '"' + (current === 0 ? ' disabled' : '') + '>上一页</button>';
        // 页码
        for (var i = 0; i < total; i++) {
            html += '<button data-page="' + i + '"' + (i === current ? ' class="current"' : '') + '>' + (i + 1) + '</button>';
        }
        // 下一页
        html += '<button data-page="' + (current + 1) + '"' + (current >= total - 1 ? ' disabled' : '') + '>下一页</button>';
        pagination.innerHTML = html;
    }

    // === 加载数据 ===
    function loadActivities(status, page) {
        grid.innerHTML = '<div class="loading-spinner">加载中</div>';
        pagination.innerHTML = '';

        var params = new URLSearchParams();
        if (status) params.set('status', status);
        params.set('page', page);
        params.set('size', pageSize);

        fetch('/api/activities?' + params.toString())
            .then(function(r) { return r.json(); })
            .then(function(data) {
                currentPage = data.currentPage;
                currentStatus = status;

                // 渲染卡片
                renderCards(data.activities);

                // 渲染计数
                var total = data.totalElements != null ? data.totalElements : 0;
                resultCount.textContent = '共 ' + total + ' 个活动';

                // 渲染分页
                renderPagination(data.currentPage, data.totalPages);

                // 更新筛选按钮高亮
                filterBar.querySelectorAll('.filter-btn').forEach(function(btn) {
                    btn.classList.toggle('active', btn.dataset.status === status);
                });

                // 更新 URL（不刷新）
                var url = '/activities';
                var urlParams = [];
                if (status) urlParams.push('status=' + status.toLowerCase());
                if (page > 0) urlParams.push('page=' + page);
                if (urlParams.length) url += '?' + urlParams.join('&');
                history.pushState({ status: status, page: page }, '', url);
            })
            .catch(function() {
                grid.innerHTML = '<div class="empty-state-list"><div class="empty-icon">⚠️</div><p>加载失败，请刷新页面重试</p></div>';
            });
    }

    // === 筛选按钮点击 ===
    filterBar.addEventListener('click', function(e) {
        var btn = e.target.closest('.filter-btn');
        if (!btn || btn.classList.contains('active')) return;
        loadActivities(btn.dataset.status, 0);
    });

    // === 分页按钮点击 ===
    pagination.addEventListener('click', function(e) {
        var btn = e.target.closest('button');
        if (!btn || btn.disabled || btn.classList.contains('current')) return;
        loadActivities(currentStatus, parseInt(btn.dataset.page));
        // 滚动到卡片区域
        grid.scrollIntoView({ behavior: 'smooth', block: 'start' });
    });

    // === 浏览器前进/后退 ===
    window.addEventListener('popstate', function(e) {
        if (e.state) {
            loadActivities(e.state.status || '', e.state.page || 0);
        } else {
            loadActivities('', 0);
        }
    });

    // === 初始加载 ===
    loadActivities('', 0);
})();
</script>
</body>
</html>
